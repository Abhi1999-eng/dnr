name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          timeout: 60s
          command_timeout: 30m
          script: |
            set -euxo pipefail
            cd /home/ubuntu/dnr
            echo "Starting deploy on $(hostname) at $(date)"
            git fetch origin
            git reset --hard origin/main
            echo "Cleaning previous build artifacts"
            deploy_ok=0
            for attempt in 1 2 3; do
              echo "Deploy attempt ${attempt}"
              rm -rf node_modules .next
              npm cache clean --force || true
              echo "Running npm ci"
              if ! npm ci; then
                echo "npm ci failed on attempt ${attempt}"
                sleep 5
                continue
              fi
              if [ ! -x node_modules/.bin/next ]; then
                echo "next binary missing after npm ci on attempt ${attempt}"
                sleep 5
                continue
              fi
              echo "Running build"
              if npm run build; then
                deploy_ok=1
                break
              fi
              echo "Build failed on attempt ${attempt}"
              sleep 5
            done
            if [ "$deploy_ok" -ne 1 ]; then
              echo "Deployment build failed after 3 attempts"
              exit 1
            fi
            echo "Restarting PM2"
            pm2 restart dnr-modern || pm2 start /home/ubuntu/dnr/ecosystem.config.cjs
            pm2 save
            echo "Deploy finished at $(date)"
