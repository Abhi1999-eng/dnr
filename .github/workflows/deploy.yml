name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          timeout: 60s
          command_timeout: 30m
          script: |
            set -euxo pipefail
            cd /home/ubuntu/dnr
            echo "Starting deploy on $(hostname) at $(date)"
            git fetch origin
            git reset --hard origin/main
            echo "Cleaning previous build artifacts"
            rm -rf node_modules .next
            echo "Running npm ci"
            install_ok=0
            for attempt in 1 2 3; do
              echo "Install attempt ${attempt}"
              rm -rf node_modules
              npm cache clean --force || true
              if npm ci && [ -x node_modules/.bin/next ]; then
                install_ok=1
                break
              fi
              echo "Install attempt ${attempt} failed or produced an incomplete node_modules tree"
              sleep 5
            done
            if [ "$install_ok" -ne 1 ]; then
              echo "npm ci failed after 3 attempts"
              exit 1
            fi
            echo "Running build"
            build_ok=0
            for attempt in 1 2 3; do
              echo "Build attempt ${attempt}"
              rm -rf .next
              if npm run build; then
                build_ok=1
                break
              fi
              echo "Build attempt ${attempt} failed; retrying after a clean install trace reset"
              sleep 5
            done
            if [ "$build_ok" -ne 1 ]; then
              echo "Build failed after 3 attempts"
              exit 1
            fi
            echo "Restarting PM2"
            pm2 restart dnr-modern || pm2 start /home/ubuntu/dnr/ecosystem.config.cjs
            pm2 save
            echo "Deploy finished at $(date)"
