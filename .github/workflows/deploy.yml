name: Branch Deploy

on:
  push:
    branches:
      - main
      - staging

jobs:
  deploy-production:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy main to production
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          timeout: 60s
          command_timeout: 30m
          script: |
            set -euxo pipefail
            cd /home/ubuntu/dnr
            git fetch origin
            git checkout main
            git reset --hard origin/main
            npm ci
            npm run build
            pm2 restart dnr-modern || pm2 start /home/ubuntu/dnr/ecosystem.config.cjs
            pm2 save

  deploy-staging:
    if: github.ref == 'refs/heads/staging'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy staging branch to staging server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          timeout: 60s
          command_timeout: 30m
          script: |
            set -euxo pipefail
            cd /home/ubuntu/dnr
            git fetch origin
            git checkout staging
            git reset --hard origin/staging
            npm ci
            npm run build
            pm2 restart dnr-staging || PORT=3000 pm2 start npm --name dnr-staging -- start
            pm2 save
            sudo nginx -t
            sudo systemctl reload nginx
